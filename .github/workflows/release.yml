# 发布流水线 —— 推送 v* tag 触发：
#   macos-desktop : macOS 上构建 Tauri GUI aka.app → dmg + zip 挂到 Release
#   windows-desktop : Windows 上构建 Tauri GUI NSIS 安装包 + portable zip → 挂到 Release
#   client-packages : 打包 Claude Code / OpenCode 插件包与 clients 总包 → 挂到 Release
#   docker-image : Dockerfile 自行 clone/build AKA engine，
#                  构建 linux/amd64 镜像 → 容器内冒烟（health/analyze/query）→
#                  推 ghcr.io/caork/aka → 镜像 tar 挂到 Release（便于 Jensen 离线 docker load）
#   checksums : 全部 release 资产上传后生成 SHA256SUMS
#
# 不再发布独立 CLI/server 压缩包；桌面 AKA 可执行文件本身支持 CLI/MCP 子命令。
# 不在 macOS 本机构建镜像（用户约定）。
name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}

permissions:
  contents: write # gh release upload
  packages: write # push GHCR

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/aka
  AKA_ENGINE_REPO: https://github.com/caork/aka-engine.git
  AKA_ENGINE_REF: f77d34f853ca1252cde573ff4e49443f95d7efed

jobs:
  macos-desktop:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json

      - name: Install desktop dependencies
        run: npm ci
        working-directory: apps/desktop

      - name: Resolve version
        id: ver
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          [ "${GITHUB_REF_TYPE}" = "tag" ] || VERSION="dev-${GITHUB_SHA::8}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Package macOS desktop GUI
        env:
          AKA_MACOS_SIGN: auto
          AKA_TAURI_UPDATER: auto
          AKA_UPDATER_ENDPOINT: https://github.com/caork/aka/releases/latest/download/latest.json
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_PATH: ${{ secrets.APPLE_API_KEY_PATH }}
          TAURI_UPDATER_PUBKEY: ${{ secrets.TAURI_UPDATER_PUBKEY }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: scripts/package-release.sh --version "${{ steps.ver.outputs.version }}" --desktop-only

      - name: Upload to release
        if: github.ref_type == 'tag'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          shopt -s nullglob
          gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1 || \
            gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --generate-notes || \
            gh release view "$GITHUB_REF_NAME" >/dev/null
          gh release upload "$GITHUB_REF_NAME" dist/aka-desktop-*.dmg dist/aka-desktop-*.app.zip dist/aka-desktop-*.app.tar.gz dist/aka-desktop-*.sig dist/aka-desktop-*.signature dist/aka-desktop-*-macos-open.sh --clobber

      - uses: actions/upload-artifact@v4
        if: github.ref_type != 'tag'
        with:
          name: macos-desktop
          path: |
            dist/aka-desktop-*.dmg
            dist/aka-desktop-*.app.zip
            dist/aka-desktop-*.app.tar.gz
            dist/aka-desktop-*.sig
            dist/aka-desktop-*.signature
            dist/aka-desktop-*-macos-open.sh

  windows-desktop:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json

      - name: Install desktop dependencies
        shell: pwsh
        run: npm ci
        working-directory: apps/desktop

      - name: Install Windows packaging tools
        shell: pwsh
        run: choco install zip --no-progress -y

      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            git
            make
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-pkgconf
            mingw-w64-x86_64-zlib

      - name: Build Windows AKA engine
        id: engine
        shell: msys2 {0}
        run: |
          set -euxo pipefail
          git clone "${AKA_ENGINE_REPO}" aka-engine-win-src
          git -C aka-engine-win-src checkout "${AKA_ENGINE_REF}"
          make -C aka-engine-win-src -f Makefile.cbm cbm
          ENGINE_BIN="${PWD}/aka-engine-win-src/build/c/aka-engine.exe"
          test -x "${ENGINE_BIN}"
          echo "bin=$(cygpath -m "${ENGINE_BIN}")" >> "$GITHUB_OUTPUT"

      - name: Build Windows desktop GUI
        id: pkg
        shell: bash
        env:
          AKA_ENGINE_BIN_WIN_X64: ${{ steps.engine.outputs.bin }}
          AKA_TAURI_UPDATER: auto
          AKA_UPDATER_ENDPOINT: https://github.com/caork/aka/releases/latest/download/latest.json
          TAURI_UPDATER_PUBKEY: ${{ secrets.TAURI_UPDATER_PUBKEY }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          set -euxo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          [ "${GITHUB_REF_TYPE}" = "tag" ] || VERSION="dev-${GITHUB_SHA::8}"

          test -f "${AKA_ENGINE_BIN_WIN_X64}"
          scripts/package-release.sh --version "${VERSION}" --desktop-windows

          echo "setup_name=aka-desktop-${VERSION}-x86_64-pc-windows-msvc-setup.exe" >> "$GITHUB_OUTPUT"
          echo "portable_name=aka-desktop-${VERSION}-x86_64-pc-windows-msvc-portable.zip" >> "$GITHUB_OUTPUT"

      - name: Smoke Windows portable GUI runtime
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $portableZip = "dist/${{ steps.pkg.outputs.portable_name }}"
          $portableDir = Join-Path $env:RUNNER_TEMP "aka-portable"
          Remove-Item -Recurse -Force $portableDir -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force $portableDir | Out-Null
          Expand-Archive -Force $portableZip $portableDir
          powershell -NoProfile -ExecutionPolicy Bypass `
            -File scripts/smoke-windows-portable.ps1 `
            -PortableDir $portableDir `
            -WorkDir (Join-Path $env:RUNNER_TEMP "aka-windows-smoke")

      - name: Upload to release
        if: github.ref_type == 'tag'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: pwsh
        run: |
          gh release view "$env:GITHUB_REF_NAME" *> $null
          if ($LASTEXITCODE -ne 0) {
            gh release create "$env:GITHUB_REF_NAME" --title "$env:GITHUB_REF_NAME" --generate-notes
            if ($LASTEXITCODE -ne 0) {
              gh release view "$env:GITHUB_REF_NAME" *> $null
            }
          }
          $assets = @(
            "dist/${{ steps.pkg.outputs.setup_name }}",
            "dist/${{ steps.pkg.outputs.setup_name }}.sig",
            "dist/${{ steps.pkg.outputs.setup_name }}.signature",
            "dist/${{ steps.pkg.outputs.portable_name }}"
          ) | Where-Object { Test-Path $_ }
          gh release upload "$env:GITHUB_REF_NAME" @assets --clobber

      - uses: actions/upload-artifact@v4
        if: github.ref_type != 'tag'
        with:
          name: windows-desktop
          path: |
            dist/aka-desktop-*-setup.exe
            dist/aka-desktop-*-setup.exe.sig
            dist/aka-desktop-*-setup.exe.signature
            dist/aka-desktop-*-portable.zip

  client-packages:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install packaging tools
        run: sudo apt-get update && sudo apt-get install -y zip unzip

      - name: Resolve version
        id: ver
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          [ "${GITHUB_REF_TYPE}" = "tag" ] || VERSION="dev-${GITHUB_SHA::8}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Package client integrations
        run: scripts/package-release.sh --version "${{ steps.ver.outputs.version }}" --clients-only

      - name: Smoke client/plugin packages
        env:
          AKA_CLIENT_SMOKE_VERSION: ${{ steps.ver.outputs.version }}
        run: scripts/smoke-client-packages.sh

      - name: Upload to release
        if: github.ref_type == 'tag'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1 || \
            gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --generate-notes || \
            gh release view "$GITHUB_REF_NAME" >/dev/null
          gh release upload "$GITHUB_REF_NAME" dist/aka-claude-code-plugin-*.zip dist/aka-opencode-plugin-*.zip dist/aka-clients-*.tar.gz --clobber

      - uses: actions/upload-artifact@v4
        if: github.ref_type != 'tag'
        with:
          name: client-packages
          path: |
            dist/aka-claude-code-plugin-*.zip
            dist/aka-opencode-plugin-*.zip
            dist/aka-clients-*.tar.gz

  docker-image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: ver
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          [ "${GITHUB_REF_TYPE}" = "tag" ] || VERSION="dev-${GITHUB_SHA::8}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build image (linux/amd64)
        run: docker build --build-arg AKA_ENGINE_REPO="$AKA_ENGINE_REPO" --build-arg AKA_ENGINE_REF="$AKA_ENGINE_REF" -t "$IMAGE:${{ steps.ver.outputs.version }}" .

      - name: Smoke test (health / analyze / query)
        run: |
          set -euxo pipefail
          docker run -d --name aka-smoke -p 4111:4111 "$IMAGE:${{ steps.ver.outputs.version }}"
          for i in $(seq 1 30); do
            curl -fsS http://127.0.0.1:4111/api/health && break
            [ "$i" = 30 ] && { docker logs aka-smoke; exit 1; }
            sleep 1
          done
          # 容器内真实跑通 AKA engine
          docker exec aka-smoke aka analyze /opt/aka/fixtures-demo
          HITS=$(curl -fsS -X POST http://127.0.0.1:4111/api/query \
            -H 'content-type: application/json' \
            -d '{"repo":"fixtures-demo","query":"user","limit":5}')
          echo "$HITS"
          echo "$HITS" | python3 -c 'import json,sys; hits=json.load(sys.stdin).get("hits", []); assert hits, "query returned no hits"'
          docker rm -f aka-smoke

      - name: Login GHCR
        if: github.ref_type == 'tag'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Push image
        if: github.ref_type == 'tag'
        run: |
          docker tag "$IMAGE:${{ steps.ver.outputs.version }}" "$IMAGE:latest"
          docker push "$IMAGE:${{ steps.ver.outputs.version }}"
          docker push "$IMAGE:latest"

      - name: Upload image tar to release
        if: github.ref_type == 'tag'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          NAME="aka-${{ steps.ver.outputs.version }}-linux-amd64.docker.tar.gz"
          docker save "$IMAGE:${{ steps.ver.outputs.version }}" | gzip > "$NAME"
          gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1 || \
            gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --generate-notes || \
            gh release view "$GITHUB_REF_NAME" >/dev/null
          gh release upload "$GITHUB_REF_NAME" "$NAME" --clobber

  checksums:
    runs-on: ubuntu-latest
    if: github.ref_type == 'tag'
    needs:
      - macos-desktop
      - windows-desktop
      - client-packages
      - docker-image
    steps:
      - uses: actions/checkout@v4

      - name: Generate release checksums
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p dist
          gh release download "$GITHUB_REF_NAME" --dir dist --skip-existing
          scripts/package-release.sh --checksums-only
          node scripts/release-manifest.mjs \
            --version "${GITHUB_REF_NAME#v}" \
            --tag "$GITHUB_REF_NAME" \
            --repo "$GITHUB_REPOSITORY" \
            --dir dist \
            --require-updater false \
            --out dist/latest.json
          gh release upload "$GITHUB_REF_NAME" dist/SHA256SUMS dist/latest.json --clobber
