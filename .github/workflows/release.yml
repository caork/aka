# 发布流水线 —— 推送 v* tag 触发：
#   linux-binary : ubuntu 上构建 x86_64 linux 二进制 → 挂到同名 GitHub Release
#   docker-image : 从公开 fork（caork/GitNexus @ engine/ENGINE_SHA）同步 engine 源码后
#                  构建 linux/amd64 镜像 → 容器内冒烟（health/analyze/query）→
#                  推 ghcr.io/caork/aka → 镜像 tar 挂到 Release（便于 Jensen 离线 docker load）
#
# 不在 macOS 本机构建镜像（用户约定）；macOS 二进制由本机 scripts/package-release.sh 产出。
name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}

permissions:
  contents: write # gh release upload
  packages: write # push GHCR

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/aka

jobs:
  linux-binary:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: |
          cargo build --release -p aka-cli
          strip target/release/aka

      - name: Package tarball
        id: pkg
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          [ "${GITHUB_REF_TYPE}" = "tag" ] || VERSION="dev-${GITHUB_SHA::8}"
          NAME="aka-${VERSION}-x86_64-unknown-linux-gnu.tar.gz"
          tar -C target/release -czf "$NAME" aka
          echo "name=$NAME" >> "$GITHUB_OUTPUT"

      - name: Upload to release
        if: github.ref_type == 'tag'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "$GITHUB_REF_NAME" "${{ steps.pkg.outputs.name }}" --clobber

      - uses: actions/upload-artifact@v4
        if: github.ref_type != 'tag'
        with:
          name: linux-binary
          path: aka-*.tar.gz

  docker-image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read engine pin
        id: engine
        run: echo "sha=$(cat engine/ENGINE_SHA)" >> "$GITHUB_OUTPUT"

      - name: Checkout engine source (public fork @ pinned SHA)
        uses: actions/checkout@v4
        with:
          repository: caork/GitNexus
          ref: ${{ steps.engine.outputs.sha }}
          path: engine-src

      - name: Sync engine into build context
        run: bash scripts/sync-engine.sh "$PWD/engine-src"

      - name: Resolve version
        id: ver
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          [ "${GITHUB_REF_TYPE}" = "tag" ] || VERSION="dev-${GITHUB_SHA::8}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build image (linux/amd64)
        run: docker build -t "$IMAGE:${{ steps.ver.outputs.version }}" .

      - name: Smoke test (health / analyze / query)
        run: |
          set -euxo pipefail
          docker run -d --name aka-smoke -p 4111:4111 "$IMAGE:${{ steps.ver.outputs.version }}"
          for i in $(seq 1 30); do
            curl -fsS http://127.0.0.1:4111/api/health && break
            [ "$i" = 30 ] && { docker logs aka-smoke; exit 1; }
            sleep 1
          done
          # 容器内真实跑通 engine（tree-sitter 原生模块 + node sidecar 是关键风险点）
          docker exec aka-smoke aka analyze /opt/aka/fixtures-demo
          HITS=$(curl -fsS -X POST http://127.0.0.1:4111/api/query \
            -H 'content-type: application/json' \
            -d '{"repo":"fixtures-demo","query":"user","limit":5}')
          echo "$HITS"
          echo "$HITS" | python3 -c 'import json,sys; hits=json.load(sys.stdin).get("hits", []); assert hits, "query returned no hits"'
          docker rm -f aka-smoke

      - name: Login GHCR
        if: github.ref_type == 'tag'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Push image
        if: github.ref_type == 'tag'
        run: |
          docker tag "$IMAGE:${{ steps.ver.outputs.version }}" "$IMAGE:latest"
          docker push "$IMAGE:${{ steps.ver.outputs.version }}"
          docker push "$IMAGE:latest"

      - name: Upload image tar to release
        if: github.ref_type == 'tag'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          NAME="aka-${{ steps.ver.outputs.version }}-linux-amd64.docker.tar.gz"
          docker save "$IMAGE:${{ steps.ver.outputs.version }}" | gzip > "$NAME"
          gh release upload "$GITHUB_REF_NAME" "$NAME" --clobber
