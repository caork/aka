# 发布流水线 —— 推送 v* tag 触发：
#   linux-binary : ubuntu 上构建 x86_64 linux 二进制 → 挂到同名 GitHub Release
#   macos-binary : macOS 上构建 aarch64 macOS 二进制 → 挂到同名 GitHub Release
#   windows-binary : windows 上构建 x86_64 Windows aka.exe → zip 挂到 Release
#   macos-desktop : macOS 上构建 Tauri GUI aka.app → dmg + zip 挂到 Release
#   windows-desktop : Windows 上构建 Tauri GUI NSIS 安装包 + portable zip → 挂到 Release
#   client-packages : 打包 Claude Code / OpenCode 插件包与 clients 总包 → 挂到 Release
#   docker-image : Dockerfile 自行 clone/build codebase-memory-mcp native engine，
#                  构建 linux/amd64 镜像 → 容器内冒烟（health/analyze/query）→
#                  推 ghcr.io/caork/aka → 镜像 tar 挂到 Release（便于 Jensen 离线 docker load）
#   checksums : 全部 release 资产上传后生成 SHA256SUMS
#
# 不在 macOS 本机构建镜像（用户约定）；macOS 二进制可由本机或 CI 的 scripts/package-release.sh 产出。
name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}

permissions:
  contents: write # gh release upload
  packages: write # push GHCR

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/aka

jobs:
  linux-binary:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: |
          cargo build --release -p aka-cli
          strip target/release/aka

      - name: Package tarball
        id: pkg
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          [ "${GITHUB_REF_TYPE}" = "tag" ] || VERSION="dev-${GITHUB_SHA::8}"
          NAME="aka-${VERSION}-x86_64-unknown-linux-gnu.tar.gz"
          tar -C target/release -czf "$NAME" aka
          echo "name=$NAME" >> "$GITHUB_OUTPUT"

      - name: Upload to release
        if: github.ref_type == 'tag'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1 || \
            gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --generate-notes || \
            gh release view "$GITHUB_REF_NAME" >/dev/null
          gh release upload "$GITHUB_REF_NAME" "${{ steps.pkg.outputs.name }}" --clobber

      - uses: actions/upload-artifact@v4
        if: github.ref_type != 'tag'
        with:
          name: linux-binary
          path: aka-*.tar.gz

  macos-binary:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Resolve version
        id: ver
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          [ "${GITHUB_REF_TYPE}" = "tag" ] || VERSION="dev-${GITHUB_SHA::8}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Package macOS binary
        run: scripts/package-release.sh --version "${{ steps.ver.outputs.version }}" --target aarch64-apple-darwin

      - name: Upload to release
        if: github.ref_type == 'tag'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1 || \
            gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --generate-notes || \
            gh release view "$GITHUB_REF_NAME" >/dev/null
          gh release upload "$GITHUB_REF_NAME" dist/aka-*-aarch64-apple-darwin.tar.gz --clobber

      - uses: actions/upload-artifact@v4
        if: github.ref_type != 'tag'
        with:
          name: macos-binary
          path: dist/aka-*-aarch64-apple-darwin.tar.gz

  windows-binary:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Build release binary
        shell: pwsh
        run: cargo build --release -p aka-cli

      - name: Package zip
        id: pkg
        shell: pwsh
        run: |
          $version = "${env:GITHUB_REF_NAME}" -replace '^v',''
          if ("${env:GITHUB_REF_TYPE}" -ne "tag") {
            $version = "dev-$($env:GITHUB_SHA.Substring(0, 8))"
          }
          $name = "aka-$version-x86_64-pc-windows-msvc.zip"
          Compress-Archive -Path target/release/aka.exe -DestinationPath $name -Force
          "name=$name" >> $env:GITHUB_OUTPUT

      - name: Upload to release
        if: github.ref_type == 'tag'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: pwsh
        run: |
          gh release view "$env:GITHUB_REF_NAME" *> $null
          if ($LASTEXITCODE -ne 0) {
            gh release create "$env:GITHUB_REF_NAME" --title "$env:GITHUB_REF_NAME" --generate-notes
            if ($LASTEXITCODE -ne 0) {
              gh release view "$env:GITHUB_REF_NAME" *> $null
            }
          }
          gh release upload "$env:GITHUB_REF_NAME" "${{ steps.pkg.outputs.name }}" --clobber

      - uses: actions/upload-artifact@v4
        if: github.ref_type != 'tag'
        with:
          name: windows-binary
          path: aka-*.zip

  macos-desktop:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json

      - name: Install desktop dependencies
        run: npm ci
        working-directory: apps/desktop

      - name: Resolve version
        id: ver
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          [ "${GITHUB_REF_TYPE}" = "tag" ] || VERSION="dev-${GITHUB_SHA::8}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Package macOS desktop GUI
        env:
          AKA_MACOS_SIGN: auto
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_PATH: ${{ secrets.APPLE_API_KEY_PATH }}
        run: scripts/package-release.sh --version "${{ steps.ver.outputs.version }}" --desktop-only

      - name: Upload to release
        if: github.ref_type == 'tag'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1 || \
            gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --generate-notes || \
            gh release view "$GITHUB_REF_NAME" >/dev/null
          gh release upload "$GITHUB_REF_NAME" dist/aka-desktop-*.dmg dist/aka-desktop-*.app.zip dist/aka-desktop-*-macos-open.sh --clobber

      - uses: actions/upload-artifact@v4
        if: github.ref_type != 'tag'
        with:
          name: macos-desktop
          path: |
            dist/aka-desktop-*.dmg
            dist/aka-desktop-*.app.zip
            dist/aka-desktop-*-macos-open.sh

  windows-desktop:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json

      - name: Install desktop dependencies
        shell: pwsh
        run: npm ci
        working-directory: apps/desktop

      - name: Install Windows packaging tools
        shell: pwsh
        run: choco install zip --no-progress -y

      - name: Build Windows desktop GUI
        id: pkg
        shell: bash
        run: |
          set -euxo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          [ "${GITHUB_REF_TYPE}" = "tag" ] || VERSION="dev-${GITHUB_SHA::8}"

          CBM_ZIP="codebase-memory-mcp-windows-amd64.zip"
          curl -fL "https://github.com/DeusData/codebase-memory-mcp/releases/latest/download/${CBM_ZIP}" -o "${CBM_ZIP}"
          unzip -q "${CBM_ZIP}" -d cbm-win
          CBM_BIN="$(find cbm-win -type f -name codebase-memory-mcp.exe | head -n 1)"
          test -f "${CBM_BIN}"

          AKA_CBM_BIN_WIN_X64="${PWD}/${CBM_BIN}" scripts/package-release.sh --version "${VERSION}" --desktop-windows

          echo "setup_name=aka-desktop-${VERSION}-x86_64-pc-windows-msvc-setup.exe" >> "$GITHUB_OUTPUT"
          echo "portable_name=aka-desktop-${VERSION}-x86_64-pc-windows-msvc-portable.zip" >> "$GITHUB_OUTPUT"

      - name: Upload to release
        if: github.ref_type == 'tag'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: pwsh
        run: |
          gh release view "$env:GITHUB_REF_NAME" *> $null
          if ($LASTEXITCODE -ne 0) {
            gh release create "$env:GITHUB_REF_NAME" --title "$env:GITHUB_REF_NAME" --generate-notes
            if ($LASTEXITCODE -ne 0) {
              gh release view "$env:GITHUB_REF_NAME" *> $null
            }
          }
          gh release upload "$env:GITHUB_REF_NAME" "dist/${{ steps.pkg.outputs.setup_name }}" "dist/${{ steps.pkg.outputs.portable_name }}" --clobber

      - uses: actions/upload-artifact@v4
        if: github.ref_type != 'tag'
        with:
          name: windows-desktop
          path: |
            dist/aka-desktop-*-setup.exe
            dist/aka-desktop-*-portable.zip

  client-packages:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install packaging tools
        run: sudo apt-get update && sudo apt-get install -y zip unzip

      - name: Resolve version
        id: ver
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          [ "${GITHUB_REF_TYPE}" = "tag" ] || VERSION="dev-${GITHUB_SHA::8}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Package client integrations
        run: scripts/package-release.sh --version "${{ steps.ver.outputs.version }}" --clients-only

      - name: Upload to release
        if: github.ref_type == 'tag'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1 || \
            gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --generate-notes || \
            gh release view "$GITHUB_REF_NAME" >/dev/null
          gh release upload "$GITHUB_REF_NAME" dist/aka-claude-code-plugin-*.zip dist/aka-opencode-plugin-*.zip dist/aka-clients-*.tar.gz --clobber

      - uses: actions/upload-artifact@v4
        if: github.ref_type != 'tag'
        with:
          name: client-packages
          path: |
            dist/aka-claude-code-plugin-*.zip
            dist/aka-opencode-plugin-*.zip
            dist/aka-clients-*.tar.gz

  docker-image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: ver
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          [ "${GITHUB_REF_TYPE}" = "tag" ] || VERSION="dev-${GITHUB_SHA::8}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build image (linux/amd64)
        run: docker build -t "$IMAGE:${{ steps.ver.outputs.version }}" .

      - name: Smoke test (health / analyze / query)
        run: |
          set -euxo pipefail
          docker run -d --name aka-smoke -p 4111:4111 "$IMAGE:${{ steps.ver.outputs.version }}"
          for i in $(seq 1 30); do
            curl -fsS http://127.0.0.1:4111/api/health && break
            [ "$i" = 30 ] && { docker logs aka-smoke; exit 1; }
            sleep 1
          done
          # 容器内真实跑通 codebase-memory-mcp native engine
          docker exec aka-smoke aka analyze /opt/aka/fixtures-demo
          HITS=$(curl -fsS -X POST http://127.0.0.1:4111/api/query \
            -H 'content-type: application/json' \
            -d '{"repo":"fixtures-demo","query":"user","limit":5}')
          echo "$HITS"
          echo "$HITS" | python3 -c 'import json,sys; hits=json.load(sys.stdin).get("hits", []); assert hits, "query returned no hits"'
          docker rm -f aka-smoke

      - name: Login GHCR
        if: github.ref_type == 'tag'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Push image
        if: github.ref_type == 'tag'
        run: |
          docker tag "$IMAGE:${{ steps.ver.outputs.version }}" "$IMAGE:latest"
          docker push "$IMAGE:${{ steps.ver.outputs.version }}"
          docker push "$IMAGE:latest"

      - name: Upload image tar to release
        if: github.ref_type == 'tag'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          NAME="aka-${{ steps.ver.outputs.version }}-linux-amd64.docker.tar.gz"
          docker save "$IMAGE:${{ steps.ver.outputs.version }}" | gzip > "$NAME"
          gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1 || \
            gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --generate-notes || \
            gh release view "$GITHUB_REF_NAME" >/dev/null
          gh release upload "$GITHUB_REF_NAME" "$NAME" --clobber

  checksums:
    runs-on: ubuntu-latest
    if: github.ref_type == 'tag'
    needs:
      - linux-binary
      - macos-binary
      - windows-binary
      - macos-desktop
      - windows-desktop
      - client-packages
      - docker-image
    steps:
      - uses: actions/checkout@v4

      - name: Generate release checksums
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p dist
          gh release download "$GITHUB_REF_NAME" --dir dist --skip-existing
          scripts/package-release.sh --checksums-only
          node scripts/release-manifest.mjs \
            --version "${GITHUB_REF_NAME#v}" \
            --tag "$GITHUB_REF_NAME" \
            --repo "$GITHUB_REPOSITORY" \
            --dir dist \
            --out dist/latest.json
          gh release upload "$GITHUB_REF_NAME" dist/SHA256SUMS dist/latest.json --clobber
